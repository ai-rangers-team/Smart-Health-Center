name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  PROJECT_ID: smart-health-a35ef
  REGION: asia-south1
  REPOSITORY: smart-health
  SERVICE: smart-health
  IMAGE_NAME: api

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/20737125641/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@smart-health-a35ef.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --min-instances=1

      - name: Pin Gemini API key
        run: |
          # The service originally referenced Secret Manager for this var; a
          # literal cannot overwrite a secret-type var in one call, so drop
          # the secret mapping first (tolerate it already being gone).
          gcloud run services update ${{ env.SERVICE }} --region=${{ env.REGION }} \
            --remove-secrets=GEMINI_API_KEY || true
          gcloud run services update ${{ env.SERVICE }} --region=${{ env.REGION }} \
            --update-env-vars=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Show service URL
        run: gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format="value(status.url)"
